databases:
  - name: qr-scanner-db
    plan: free
    databaseName: qr_scanner
    user: qr_scanner_user

services:
  - type: web
    name: qr-scanner
    runtime: python
    plan: free
    rootDir: qr_scanner_backend
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: NODE_VERSION
        value: "22"
      - key: DATABASE_URL
        fromDatabase:
          name: qr-scanner-db
          property: connectionString
